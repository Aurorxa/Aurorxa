# [tools] - 开发工具版本
[tools]
node = "24"
npm = "10"
pnpm = "10"

# [env] - 环境变量
[env]

# [tasks] - 项目任务
[tasks.install]
description = "安装依赖"
run = """
    npm install
"""

[tasks.build]
description = "构建"
depends = ["install"]
run = "npm run docs:build"

[tasks.dev]
description = "开发"
depends = ["install"]
run = "npm run docs:dev"

[tasks.preview]
description = "预览"
depends = ["build"]
run = "npm run docs:preview"

